name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build

      - name: Verify SEO/AEO/GEO crawl signals
        run: node scripts/verify-seo.mjs
      
      - name: Deploy status
        run: |
          echo "✓ Build completed successfully"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "If you have a hosting service connected (Netlify, Vercel, etc.),"
          echo "they should automatically deploy this build."
      
      # Add your deployment steps here based on your hosting provider
      # Examples:
      # - For Netlify: use netlify/action
      # - For Vercel: use vercel/action
      # - For GitHub Pages: use peaceiris/actions-gh-pages

