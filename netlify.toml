[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect old /projects path to /gallery
[[redirects]]
  from = "/projects"
  to = "/gallery"
  status = 301

# Redirect removed service pages
[[redirects]]
  from = "/services/waterproofing"
  to = "/services"
  status = 301

[[redirects]]
  from = "/services/restoration"
  to = "/services/building-restoration"
  status = 301

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache gallery images aggressively (1 year)
[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache other static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
