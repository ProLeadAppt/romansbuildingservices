[build]
  # `npx puppeteer browsers install chrome` is required because Netlify caches
  # node_modules between builds, so puppeteer's postinstall (which downloads
  # Chrome) doesn't re-run on cached installs. Running it explicitly is fast
  # (~2s) when Chrome is already cached, and idempotent otherwise.
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 + react-router 7 require Node >= 20.19; bump to 22 LTS to match.
  NODE_VERSION = "22"
  # Cache Chrome between builds in Netlify's persistent cache dir.
  PUPPETEER_CACHE_DIR = "/opt/build/cache/puppeteer"

# Redirect old /projects path to /gallery
[[redirects]]
  from = "/projects"
  to = "/gallery"
  status = 301

# Redirect removed service pages
[[redirects]]
  from = "/services/waterproofing"
  to = "/services"
  status = 301

[[redirects]]
  from = "/services/restoration"
  to = "/services/building-restoration"
  status = 301

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache gallery images aggressively (1 year)
[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache other static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
